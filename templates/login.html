{% extends "base.html" %}

{% block title %}Login - Placement Management System{% endblock %}

{% block extra_css %}
<style>
    .login-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
    }

    .login-card {
        background-color: white;
        padding: 3rem;
        border-radius: 0.5rem;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-header h1 {
        font-size: 2rem;
        color: #1e40af;
        margin-bottom: 0.5rem;
    }

    .login-header p {
        color: #64748b;
    }

    .login-form .form-group label {
        font-weight: 600;
        margin-bottom: 0.5rem;
    }

    .login-form .form-group input {
        width: 100%;
        padding: 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        font-size: 1rem;
    }

    .login-form .form-group input:focus {
        outline: none;
        border-color: #1e40af;
        box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
    }

    .login-btn {
        width: 100%;
        padding: 0.75rem;
        background-color: #1e40af;
        color: white;
        border: none;
        border-radius: 0.375rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s ease;
        margin-top: 1.5rem;
    }

    .login-btn:hover {
        background-color: #1e3a8a;
    }

    .login-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.875rem;
        color: #64748b;
    }

    .demo-info {
        background-color: #dbeafe;
        border-left: 4px solid #0369a1;
        padding: 1rem;
        border-radius: 0.375rem;
        margin-bottom: 2rem;
        font-size: 0.95rem;
    }

    .demo-info strong {
        color: #0369a1;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>📋 PMS</h1>
            <p>Placement Management System</p>
        </div>

        <div class="demo-info">
            <p><strong>Demo Login:</strong></p>
            <p>Username: <code>admin</code><br>Password: <code>admin</code></p>
        </div>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter username"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button type="submit" class="login-btn">Sign in</button>
        </form>

        <div class="login-footer">
            <p>Placement Management System v1.0</p>
        </div>
    </div>
</div>
{% endblock %}
